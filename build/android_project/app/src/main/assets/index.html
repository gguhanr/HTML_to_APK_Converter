<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Web App</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --fg: #1a1a1a;
      --card: #ffffff;
      --accent: #2196F3;
    }
    [data-theme="dark"] {
      --bg: #121212;
      --fg: #e0e0e0;
      --card: #1e1e1e;
      --accent: #64b5f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }
    h1 { color: var(--accent); margin-bottom: 16px; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 15px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      margin-bottom: 10px;
    }
    #drop-zone {
      border: 2px dashed var(--accent);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      margin-top: 10px;
    }
    #note-output { margin-top: 10px; font-style: italic; }
  </style>
</head>
<body>

  <h1>🌐 My Web App</h1>

  <!-- ── Note Saver (uses localStorage) ── -->
  <div class="card">
    <h2>📝 Persistent Notes</h2>
    <p>Notes are saved even after closing the app.</p>
    <input type="text" id="note-input" placeholder="Type a note…" />
    <button onclick="saveNote()">Save Note</button>
    <div id="note-output"></div>
  </div>

  <!-- ── Theme Toggle ── -->
  <div class="card">
    <h2>🌙 Dark / Light Mode</h2>
    <button onclick="toggleTheme()">Toggle Theme</button>
  </div>

  <!-- ── Drag & Drop ── -->
  <div class="card">
    <h2>📂 Drag & Drop a File</h2>
    <div id="drop-zone"
         ondragover="event.preventDefault()"
         ondrop="handleDrop(event)">
      Drop a file here
    </div>
    <div id="drop-result"></div>
  </div>

  <!-- ── File Picker ── -->
  <div class="card">
    <h2>📁 File Picker</h2>
    <input type="file" id="file-picker" onchange="showFile(event)" />
  </div>

  <script>
    // ── localStorage note ────────────────────────────────────────
    function saveNote() {
      const val = document.getElementById('note-input').value;
      localStorage.setItem('user_note', val);
      document.getElementById('note-output').textContent = '✅ Saved: ' + val;
    }
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('user_note');
      if (saved) document.getElementById('note-output').textContent = 'Last note: ' + saved;
    });

    // ── Dark mode ────────────────────────────────────────────────
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('theme', html.getAttribute('data-theme'));
    }
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    // ── Drag & drop ──────────────────────────────────────────────
    function handleDrop(e) {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file) {
        document.getElementById('drop-result').textContent =
          '📄 Dropped: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
      }
    }

    // ── File picker ──────────────────────────────────────────────
    function showFile(e) {
      const file = e.target.files[0];
      if (file) alert('Selected: ' + file.name);
    }
  </script>
</body>
</html>
